random_seed: 42

datasets:
  student:
    names:
      - student-mat
      - student-por
      - student-combined
    raw_paths:
      student-mat: data/raw/student-mat.csv
      student-por: data/raw/student-por.csv
    target_column: G3
    scenarios:
      - mid
      - late
  xapi:
    name: xapi
    raw_path: data/raw/xAPI-Edu-Data.csv
    target_column: Class
    scenario: xapi_behavior

split:
  train_size: 0.7
  validation_size: 0.15
  test_size: 0.15
  seed: 42

imbalance_methods:
  - none
  - smote
  - adasyn
  - class_weight_balanced

models:
  student_deep: clsv2
  xapi_deep: cnn_bilstm_xapi
  baselines:
    - decision_tree
    - random_forest
    - svm_rbf
    - gradient_boosting

deep_learning:
  epochs: 80
  batch_size: 32
  learning_rate: 0.001
  early_stopping_patience: 12
  dropout: 0.3
  label_smoothing: 0.0
  scheduler: none

optuna:
  enabled: false
  note: "Required by the thesis outline, but disabled in the final lightweight imbalance runs unless explicitly implemented and called."
